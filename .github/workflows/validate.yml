name: Validate AtmosLogic

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m py_compile custom_components/atmoslogic/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

